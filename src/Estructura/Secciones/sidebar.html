<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nap Perfum | Menú lateral</title>
  <link rel="stylesheet" href="../Estilo/styles.css">
</head>
<body>
  <div class="sidebar-overlay is-visible"></div>

  <aside class="sidebar is-open" aria-label="Menú lateral">
    <div class="sidebar-head">
      <h3>Filtrar perfumes</h3>
      <button class="close-btn" type="button" aria-label="Cerrar menú">×</button>
    </div>

    <nav class="sidebar-nav">
      <a class="filter-link home-link" href="#">Volver al inicio</a>
      <p class="nav-title">Por marca</p>
      <button class="filter-link active" type="button">Todos</button>
      <button class="filter-link" type="button">Maison de Nuit</button>
      <button class="filter-link" type="button">Velvet</button>
      <button class="filter-link" type="button">Ocean</button>
      <button class="filter-link" type="button">Cedar</button>

      <p class="nav-title">Por género</p>
      <button class="filter-link" type="button">Femenino</button>
      <button class="filter-link" type="button">Masculino</button>
      <button class="filter-link" type="button">Unisex</button>
    </nav>
  </aside>

  <main class="shell">
    <section class="hero">
      <div class="eyebrow">Sección de filtros</div>
      <h1>Este bloque muestra el menú lateral con categorías por marca y género.</h1>
    </section>
  </main>
</body>
</html>
